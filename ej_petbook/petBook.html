<!DOCTYPE html>

<body>
    
<h1>¡Bienvenido a PetBook!</h1>
<p>La nueva red social para mascotas</p>
<form>
    <label for="nombre_mascota">Nombre:</label>
    <input type="text" id="nombre_mascota" name="username" placeholder="Nombre de la mascota" required>

    <label>Edad: <input type="number" id="edad_mascota" name="edad" placeholder="Edad de la mascota" required></label>

    <label for="mail">e-mail:</label>
    <input type="email" id="mail" name="mail" placeholder="e-mail" required>

    <label>Contraseña: <input type="password" id="pasword" name="pasword" placeholder="Contraseña" required></label>

    <label for="color">Color de la mascota:</label>
    <input type="color" id="color" name="color" placeholder="Color de la mascota" required>

    <input type="submit">
</form>    


</body>
